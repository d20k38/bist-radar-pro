<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIST Radar Pro v16</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root{--bg:#eef5ff;--card:#fff;--ink:#07162d;--blue:#145bf5;--green:#16a34a;--red:#dc2626;--yellow:#f59e0b;--line:#dbe5f3}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--ink)}.wrap{max-width:1440px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{font-size:30px;font-weight:900}.pill{background:#fff;border:1px solid var(--line);border-radius:99px;padding:10px 14px;font-weight:800}.controls{display:grid;grid-template-columns:2fr 1.2fr auto auto;gap:10px;margin:16px 0}.controls input,.controls select{padding:14px;border:1px solid var(--line);border-radius:14px;font-size:16px}.btn{border:0;border-radius:14px;background:var(--blue);color:white;font-weight:900;padding:13px 16px;cursor:pointer}.btn.gray{background:#64748b}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.tab{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 15px;font-weight:900;cursor:pointer}.tab.active{background:var(--blue);color:#fff}.status{background:#fff7e6;border:1px solid #ffd889;padding:13px;border-radius:14px;margin:12px 0}.grid{display:grid;gap:16px}.g5{grid-template-columns:repeat(5,1fr)}.g2{grid-template-columns:1.2fr .8fr}.card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 10px 25px #0001}.head{background:var(--blue);color:#fff;font-weight:900;font-size:20px;padding:15px}.head.green{background:var(--green)}.head.dark{background:#0b1220}.body{padding:16px}.metric{text-align:center}.metric .v{font-size:28px;font-weight:900}.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--yellow)}.barw{height:10px;background:#e7eef8;border-radius:99px;overflow:hidden}.bar{height:100%}.comment{background:#f6f8fb;border:1px solid var(--line);border-radius:14px;padding:14px;line-height:1.55}.hidden{display:none}.table{width:100%;border-collapse:collapse}.table th{background:#243449;color:white;padding:10px;text-align:left}.table td{padding:10px;border-bottom:1px solid var(--line)}.chartbox{height:420px}@media(max-width:800px){.wrap{padding:10px}.brand{font-size:22px}.controls,.g5,.g2{grid-template-columns:1fr}.chartbox{height:310px}.btn,.tab{width:100%}}</style></head><body><div class="wrap"><div class="top"><div class="brand">📈 BIST Radar Pro v16</div><div class="pill">Gerçek proje temeli • Yahoo fiyat • AI karar • Backtest</div></div><div class="controls"><input id="search" placeholder="Hisse kodu: PAPIL" value="PAPIL"><select id="symbol"></select><button class="btn" onclick="loadStock()">Analiz Et</button><button class="btn gray" onclick="backtest()">Backtest</button></div><div class="tabs"><button class="tab active" onclick="page('analysis',this)">📊 Hisse Analizi</button><button class="tab" onclick="page('scan',this)">🏆 En Güçlü 20</button><button class="tab" onclick="page('portfolio',this)">💼 Portföy</button></div><div id="status" class="status">Hazır.</div><section id="analysis"><div id="cards" class="grid g5"></div><br><div class="grid g2"><div class="card"><div class="head">📈 Fiyat Grafiği ve Teknik Göstergeler</div><div class="body"><div class="chartbox"><canvas id="chart"></canvas></div></div></div><div class="card"><div class="head green">🧠 Uzman Motor Özeti</div><div class="body" id="engine"></div></div></div><br><div class="grid g2"><div class="card"><div class="head dark">👨‍🏫 Uzman Yorumu</div><div class="body"><div id="expert" class="comment"></div></div></div><div class="card"><div class="head dark">🤖 AI Yorumu</div><div class="body"><div id="ai" class="comment"></div></div></div></div></section><section id="scan" class="hidden"><div class="card"><div class="head">🏆 En Güçlü 20</div><div class="body"><button class="btn" onclick="scanAll()">Tara</button><br><br><table id="scanTable" class="table"></table></div></div></section><section id="portfolio" class="hidden"><div class="card"><div class="head">💼 Portföy</div><div class="body"><div class="comment">Portföy verisi tarayıcıda saklanır. Bir sonraki sürümde Supabase bulut senkronizasyonu eklenebilir.</div></div></div></section></div><script>let chart,syms=[];const fmt=(x,d=2)=>Number.isFinite(Number(x))?Number(x).toLocaleString('tr-TR',{maximumFractionDigits:d,minimumFractionDigits:d}):'-';const tl=x=>fmt(x)+' TL';function setStatus(t){document.getElementById('status').textContent=t}function page(id,b){['analysis','scan','portfolio'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));b.classList.add('active')}async function init(){try{const j=await (await fetch('/api/symbols')).json();syms=j.symbols||['PAPIL'];document.getElementById('symbol').innerHTML=syms.map(s=>`<option>${s}</option>`).join('');document.getElementById('symbol').onchange=e=>{document.getElementById('search').value=e.target.value;loadStock()};await loadStock()}catch(e){setStatus('Başlatma hatası: '+e.message)}}async function loadStock(){const s=document.getElementById('search').value.toUpperCase().trim()||'PAPIL';setStatus(s+' verisi alınıyor...');try{const j=await (await fetch('/api/stock?symbol='+encodeURIComponent(s))).json();if(!j.success)throw new Error(j.error);render(j);setStatus(s+' Yahoo Finance son verisi ile analiz edildi.')}catch(e){setStatus('Veri alınamadı: '+e.message)}}function render(j){const a=j.analysis,c=j.comments||{};const cards=[['Karar',a.decision,a.finalScore>=65?'ok':a.finalScore>=50?'warn':'bad'],['Güven','%'+fmt(a.confidence,0),'ok'],['Risk','%'+fmt(a.risk,0),a.risk<50?'ok':'bad'],['Hedef','%'+fmt(((a.target1-a.close)/a.close)*100,1),'ok'],['Son Fiyat',tl(a.close),a.change>=0?'ok':'bad']];document.getElementById('cards').innerHTML=cards.map(x=>`<div class="card metric"><div class="body"><div>${x[0]}</div><div class="v ${x[2]}">${x[1]}</div><small>Değişim: ${fmt(a.change)}%</small></div></div>`).join('');document.getElementById('engine').innerHTML=['trend','money','momentum','pattern','confidence','risk'].map(k=>{const v=a[k]||0;return `<b>${k.toUpperCase()}: ${fmt(v,0)}/100</b><div class="barw"><div class="bar" style="width:${v}%;background:${k==='risk'?(v<50?'#16a34a':'#dc2626'):(v>65?'#16a34a':'#f59e0b')}"></div></div><br>`}).join('')+`<div class="comment"><b>Formasyon:</b> ${a.formation?.name||'-'}<br><b>ADX:</b> ${fmt(a.adx)} | <b>SuperTrend:</b> ${a.superTrendDir===1?'AL':'SAT'}<br><b>Stop:</b> ${tl(a.stop)} | <b>Hedef:</b> ${tl(a.target1)}</div>`;document.getElementById('expert').textContent=c.expert||'';document.getElementById('ai').textContent=c.ai||'';draw(a.ohlcv||j.ohlcv||[],a)}function draw(rows,a){if(chart)chart.destroy();const ctx=document.getElementById('chart');rows=rows.slice(-160);chart=new Chart(ctx,{type:'line',data:{labels:rows.map(r=>r.date),datasets:[{label:'Fiyat',data:rows.map(r=>r.close),borderWidth:2,pointRadius:0},{label:'EMA20',data:calcEma(rows.map(r=>r.close),20),borderWidth:1,pointRadius:0},{label:'EMA50',data:calcEma(rows.map(r=>r.close),50),borderWidth:1,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'Fiyat Grafiği ve Teknik Göstergeler'}}}})}function calcEma(a,n){let k=2/(n+1),o=[];a.forEach((v,i)=>o[i]=i?v*k+o[i-1]*(1-k):v);return o}async function scanAll(){setStatus('Taranıyor...');const j=await (await fetch('/api/scan?limit=20')).json();const rows=j.data||[];document.getElementById('scanTable').innerHTML='<tr><th>Hisse</th><th>Karar</th><th>Skor</th><th>Risk</th></tr>'+rows.map(r=>`<tr><td>${r.symbol}</td><td>${r.decision}</td><td>${fmt(r.finalScore,0)}</td><td>${fmt(r.risk,0)}</td></tr>`).join('');setStatus(rows.length+' hisse tarandı.')}async function backtest(){const s=document.getElementById('search').value.toUpperCase().trim()||'PAPIL';const j=await (await fetch('/api/backtest?symbol='+s+'&period=30')).json();alert(j.success?`${s} Backtest\n30 gün önce: ${j.past.decision}\nGetiri: %${j.returnPct}\nSonuç: ${j.result}`:'Backtest hatası: '+j.error)}init()</script></body></html>
